name: SwiftPay CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Setup Java
        uses: actions/setup-java@v4.7.0
        with:
          distribution: temurin
          java-version: '21'

      - name: Build
        run: mvn clean install

      - name: Run Tests
        run: mvn test

      - name: Build Docker Images
        run: docker compose build
