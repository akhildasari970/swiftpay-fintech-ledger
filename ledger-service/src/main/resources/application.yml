server:
  port: 8082

spring:
  application:
    name: ledger-service

  datasource:
    url: jdbc:postgresql://postgres:5432/swiftpay
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  kafka:
    bootstrap-servers: kafka:9092

management:
  endpoints:
    web:
      exposure:
        include: health,info