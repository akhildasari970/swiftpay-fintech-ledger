apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: swiftpay-ingress
spec:
  rules:
  - http:
      paths:
      - path: /api/payments
        pathType: Prefix
        backend:
          service:
            name: transaction-gateway
            port:
              number: 80
      - path: /api/ledger
        pathType: Prefix
        backend:
          service:
            name: ledger-service
            port:
              number: 80
      - path: /api/analytics
        pathType: Prefix
        backend:
          service:
            name: analytics-worker
            port:
              number: 80
