
services:
  redis:
    image: redis:7
    ports:
      - "6379:6379"

  zookeeper:
    image: confluentinc/cp-zookeeper:latest

  kafka:
    image: confluentinc/cp-kafka:latest

  postgres:
    image: postgres:16


  transaction-gateway:
    build: ./transaction-gateway
    ports:
      - "8081:8080"

  ledger-service:
    build: ./ledger-service
    ports:
      - "8082:8080"

  analytics-worker:
    build: ./analytics-worker
    ports:
      - "8083:8083"
