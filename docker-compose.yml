version: '3.8'
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: swiftpay
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
  redis:
    image: redis:7
    ports:
      - "6379:6379"
  kafka:
    image: apache/kafka:latest
    ports:
      - "9092:9092"
